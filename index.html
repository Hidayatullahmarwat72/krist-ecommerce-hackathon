<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krist - Home</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <a href="index.html">Krist</a>
            </div>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="index.html#products">Shop</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </div>
            <div class="nav-icons">
                <a href="cart.html" class="icon-link">
                    🛒
                    <span class="badge" id="cart-badge">0</span>
                </a>
                <a href="wishlist.html" class="icon-link">
                    ♡
                    <span class="badge" id="wishlist-badge">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Hero Slider -->
    <section class="hero-slider">
        <!-- Slider will be injected by JavaScript -->
    </section>

    <!-- Products Section -->
    <section class="products-section" id="products">
        <div class="container">
            <h2 class="section-title">All Products</h2>
            
            <!-- Filters -->
            <div class="filters-section">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Search products..." onkeyup="filterProducts()">
                </div>
                <div class="filter-group">
                    <select id="category-filter" onchange="filterProducts()">
                        <option value="All">All Categories</option>
                    </select>
                    <select id="sort-filter" onchange="filterProducts()">
                        <option value="default">Default</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                        <option value="rating">Rating</option>
                    </select>
                </div>
            </div>

            <!-- Results summary -->
            <div id="results-summary" class="results-summary"></div>

            <!-- Products Grid -->
            <div class="products-grid" id="products-grid">
                <!-- Products will be injected by JavaScript -->
            </div>

            <!-- Pagination -->
            <div class="pagination" id="pagination">
                <!-- Pagination will be injected by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>Krist</h3>
                    <p>Your one-stop shop for fashion and accessories.</p>
                </div>
                <div class="footer-section">
                    <h3>Quick Links</h3>
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="#products">Shop</a></li>
                        <li><a href="about.html">About</a></li>
                        <li><a href="contact.html">Contact</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h3>Categories</h3>
                    <ul>
                        <li><a href="#">Men</a></li>
                        <li><a href="#">Women</a></li>
                        <li><a href="#">Kids</a></li>
                        <li><a href="#">Accessories</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                &copy; 2024 Krist. All Rights Reserved.
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/slider.js"></script>
    <script src="js/products.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/wishlist.js"></script>
    <script>
        const ITEMS_PER_PAGE = 6;
        let currentPage = 1;
        let lastFiltered = [];

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            // Load categories
            const categories = getCategories();
            const categorySelect = document.getElementById('category-filter');
            categories.forEach(category => {
                const option = document.createElement('option');
                option.value = category;
                option.textContent = category;
                categorySelect.appendChild(option);
            });

            // Initial render
            filterProducts();
            updateBadges();
        });

        // Filter and search products
        function filterProducts(page = 1) {
            currentPage = page;

            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const category = document.getElementById('category-filter').value;
            const sortBy = document.getElementById('sort-filter').value;

            let filtered = [...products];

            // Filter by search
            if (searchTerm) {
                filtered = filtered.filter(p =>
                    p.name.toLowerCase().includes(searchTerm) ||
                    p.brand.toLowerCase().includes(searchTerm)
                );
            }

            // Filter by category
            if (category !== 'All') {
                filtered = filtered.filter(p => p.category === category);
            }

            // Sort
            if (sortBy === 'price-low') {
                filtered.sort((a, b) => a.price - b.price);
            } else if (sortBy === 'price-high') {
                filtered.sort((a, b) => b.price - a.price);
            } else if (sortBy === 'rating') {
                filtered.sort((a, b) => b.rating - a.rating);
            }

            lastFiltered = filtered;
            renderPaginated();
        }

        function renderPaginated() {
            const total = lastFiltered.length;
            const totalPages = Math.ceil(total / ITEMS_PER_PAGE);
            if (currentPage > totalPages) currentPage = totalPages || 1;

            const start = (currentPage - 1) * ITEMS_PER_PAGE;
            const paginated = lastFiltered.slice(start, start + ITEMS_PER_PAGE);
            renderProducts(paginated);
            renderPagination(totalPages);
            updateSummary(start, paginated.length, total);
        }

        function renderPagination(totalPages) {
            const pagination = document.getElementById('pagination');
            if (!pagination) return;
            let html = '';
            if (currentPage > 1) {
                html += `<button class="page-btn" onclick="filterProducts(${currentPage - 1})">Prev</button>`;
            }
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="page-btn${i === currentPage ? ' active' : ''}" onclick="filterProducts(${i})">${i}</button>`;
            }
            if (currentPage < totalPages) {
                html += `<button class="page-btn" onclick="filterProducts(${currentPage + 1})">Next</button>`;
            }
            pagination.innerHTML = html;
        }

        function updateSummary(start, count, total) {
            const summary = document.getElementById('results-summary');
            if (!summary) return;
            const end = start + count;
            summary.textContent = `Showing ${start + 1}-${end} of ${total} results`;
        }
    </script>
</body>
</html>
